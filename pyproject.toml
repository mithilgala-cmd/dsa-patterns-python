[tool.ruff]
line-length = 100
target-version = "py311"
src = [
  "basics",
  "arrays",
  "backtracking",
  "binary_search",
  "bit_manipulation",
  "dynamic_programming",
  "graphs",
  "greedy",
  "hashing",
  "heap",
  "intervals",
  "linked_list",
  "math",
  "math_geometry",
  "recursion",
  "scripts",
  "sliding_window",
  "stack",
  "strings",
  "tests",
  "trees",
  "trie",
  "two_heaps",
  "two_pointers",
  "union_find",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
pretty = true
show_error_codes = true
warn_unused_configs = true
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
strict_equality = true
files = [
  "basics",
  "arrays",
  "backtracking",
  "binary_search",
  "bit_manipulation",
  "dynamic_programming",
  "graphs",
  "greedy",
  "hashing",
  "heap",
  "intervals",
  "linked_list",
  "math",
  "math_geometry",
  "recursion",
  "scripts",
  "sliding_window",
  "stack",
  "strings",
  "tests",
  "trees",
  "trie",
  "two_heaps",
  "two_pointers",
  "union_find",
]
